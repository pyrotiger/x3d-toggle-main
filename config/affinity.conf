# CPU Affinity & Process Pinning Ruleset
# Format: [EXECUTABLE_NAME]=[AFFINITY_MASK]
# Mask is a hexadecimal value representing the logical core bitmask.
# 
# Examples:
#   Pin to CCD0 (Cores 0-7 on 16-thread): 0x00FF
#   Pin to CCD1 (Cores 8-15 on 16-thread): 0xFF00
#   Pin to specific Hyperthreads: 0x5555
# -----------------------------------------------------------------------------

# System Services (Example: Pin to Frequency CCD)
# discord=0xFF00
# steam=0xFF00

# High-Performance Overrides
# render_engine=0xFFFF

# -----------------------------------------------------------------------------
# end of AFFINITY.CONF
