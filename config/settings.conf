
## Configuration File for all configurable standard-user options for the X3D Toggle Project
## `x3d-settings.conf`
## Default values for the configuration of the daemon.
## DO NOT EDIT THIS FILE! Use UI instead or edit file: /etc/x3d-toggle.d

# Polling Interval (in seconds)
# How often the daemon checks for game/compute activity.
# Range: 1-10 (Lower = faster response but uses more CPU resources)
POLLING_INTERVAL=3

# Compute Load Threshold (Percentage)
# Total CPU usage percentage required to trigger throughput mode.
# Measured over a 200ms sample window.
# Default: 50 (50% total CPU usage across all cores)
# Range: 10 - 90 (Lower = more aggressive switching)
LOAD_THRESHOLD=50

# Game Detection Mode
# 1 = Strict (Only steam/gamemode)
# 2 = Loose (Also checks for high-load processes matching .desktop categories)
DETECTION_LEVEL=2

# eBPF Scheduler (0/1)
# When enabled (1), the daemon uses eBPF for workload detection.
# When disabled (0), falls back to procfs polling.
# Requires CAP_SYS_ADMIN/CAP_BPF (provided by the systemd service).
EBPF_ENABLE=1

# Developer Mode (0/1)
# Standard (0) or Developer (1).
# Developer mode enables extended diagnostics and stress test tools in the UI.
DEV_ENABLE=0
# ##USE AT OWN RISK!##

# Affinity Management Mode
# Defines how the daemon handles thread placement for detected games.
# 0: Auto / Sysfs only (OS scheduler handles priority)
# 1: By Die (Maps games strictly to the primary cache-heavy CCD)
# 2: Manual (Uses the MANUAL_AFFINITY_MASK below)
AFFINITY_LEVEL=0

# Manual Affinity Mask
# Define the exact core isolation mask if AFFINITY_LEVEL=2.
# Example for a 16-core heterogeneous topology: 0-7,16-23
AFFINITY_MASK=0

# Fallback Profile
# The hardware profile to apply when no games are detected and load is low.
# Options: cache, frequency, default
FALLBACK_PROFILE=default

# Server Endpoint
# Sets server URL and port for remote telemetry/control.
# Format: <IP_ADDRESS>:<PORT>
SERVER_ADDRESS=127.0.0.1:9370

# Default state of the daemon on startup (auto/manual/default)
DAEMON_STATE=default

# Refresh interval for the dynamic status window (seconds)
REFRESH_INTERVAL=0.5

# Debug Mode
# 1 = Debug Mode
# 0 = Normal Mode
DEBUG_ENABLE=0

# [Clang-Tidy] Static Analysis
# Options: enabled, disabled
LINT_CLANG_DIAGNOSTIC=enabled
LINT_CLANG_BUGPRONE=enabled
LINT_CLANG_MODERNIZE=enabled
LINT_CLANG_READABILITY=enabled
LINT_CLANG_PERFORMANCE=enabled
LINT_CLANG_PORTABILITY=enabled
LINT_CLANG_ANALYZER=enabled

# [Cppcheck] Bug Hunting
# Options: enabled, disabled
LINT_CPPCHECK_ALL=enabled
LINT_CPPCHECK_WARNING=enabled
LINT_CPPCHECK_STYLE=enabled
LINT_CPPCHECK_PERFORMANCE=enabled
LINT_CPPCHECK_PORTABILITY=enabled
LINT_CPPCHECK_INFORMATION=disabled
LINT_CPPCHECK_UNUSED=enabled

# [Valgrind] Runtime Memory Analysis
# Mode Options: full, summary, disabled
LINT_VALGRIND_MODE=full
# Kind Options: all, definite, indirect, possible, reachable
LINT_VALGRIND_KINDS=all
# Origin Tracking: enabled, disabled (High CPU overhead)
LINT_VALGRIND_ORIGINS=enabled

# [Journal] Retention & Rotation
# Number of daily archives to keep.
JOURNAL_KEEP=7
# Maximum file size in MB before rotation.
JOURNAL_MAX_MB=10

if [ "$1" = "--gen-c" ]; then
    printf "# User Configuration Defaults (Sourced from x3d-settings.conf)\n"
    # shellcheck disable=SC2112
    dump_self() {
        while IFS= read -r line; do
            case "$line" in
                "#!"*) continue ;;
                "if [ \"\$1\" = \"--gen-c\" ]; then"*) break ;;
            esac
            printf "%s\n" "$line"
        done < "$0"
    }
    dump_self
    exit 0
fi

# end of X3D_SETTINGS.CONF
