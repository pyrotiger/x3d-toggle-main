name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libbpf-dev libsystemd-dev libgtk-4-dev libadwaita-1-dev clang make pkg-config bpftool

    - name: Generate vmlinux.h
      run: |
        mkdir -p build
        sudo bpftool btf dump file /sys/kernel/btf/vmlinux format c > build/vmlinux.h

    - name: Build and Install
      run: sudo make purge install

    - name: Automated Setup (Full)
      run: |
        export X3D_SETUP_MODE=full
        sudo -E ./setup.sh
