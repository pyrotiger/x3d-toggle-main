name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 2 * * 0' # Runs at 02:30 UTC every Sunday

jobs:
  analyze:
    name: Analyze C/C++
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        chmod +x dev/toolsets/codeql/install-deps.sh
        ./dev/toolsets/codeql/install-deps.sh

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: cpp
        config-file: dev/toolsets/codeql/codeql-config.yml

    - name: Build X3D-Toggle (CLI)
      run: |
        make all
        
    - name: Build X3D-Toggle (GTK4 GUI)
      run: |
        sh ./scripts/framework/gui.sh

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:cpp"
