name: Makefile CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libbpf-dev libsystemd-dev libgtk-4-dev libadwaita-1-dev clang make pkg-config linux-tools-generic bpftool

    - name: Generate vmlinux.h
      run: |
        mkdir -p build
        sudo bpftool btf dump file /sys/kernel/btf/vmlinux format c > build/vmlinux.h

    - name: Build project
      # Standard compilation target only. Sudo is omitted.
      run: make

    - name: Run distcheck
      # Verifies distribution packaging if configured in the Makefile
      run: make distcheck